<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" role="img" aria-label="Wero, el perro de Jochos El Perro Wero">
  <!-- Yellow body -->
  <ellipse cx="100" cy="120" rx="55" ry="45" fill="#FACC15"/>
  <!-- Magenta mohawk (5 triangles) -->
  <polygon points="72,78 78,55 84,78" fill="#EC4899"/>
  <polygon points="84,76 90,50 96,76" fill="#EC4899"/>
  <polygon points="96,75 102,48 108,75" fill="#EC4899"/>
  <polygon points="108,76 114,50 120,76" fill="#EC4899"/>
  <polygon points="120,78 126,55 132,78" fill="#EC4899"/>
  <!-- Head circle -->
  <ellipse cx="100" cy="90" rx="38" ry="35" fill="#FACC15"/>
  <!-- Black sunglasses -->
  <ellipse cx="84" cy="88" rx="14" ry="10" fill="#111111"/>
  <ellipse cx="116" cy="88" rx="14" ry="10" fill="#111111"/>
  <rect x="97" y="86" width="6" height="4" rx="2" fill="#111111"/>
  <!-- Eyes (white dots inside glasses) -->
  <circle cx="84" cy="87" r="4" fill="#FFFFFF"/>
  <circle cx="116" cy="87" r="4" fill="#FFFFFF"/>
  <!-- Smile -->
  <path d="M 85 100 Q 100 112 115 100" stroke="#111111" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Spiked collar (5 triangles) -->
  <polygon points="68,130 72,120 76,130" fill="#EC4899"/>
  <polygon points="80,128 84,117 88,128" fill="#EC4899"/>
  <polygon points="94,126 100,114 106,126" fill="#EC4899"/>
  <polygon points="112,128 116,117 120,128" fill="#EC4899"/>
  <polygon points="124,130 128,120 132,130" fill="#EC4899"/>
  <ellipse cx="100" cy="128" rx="38" ry="10" fill="#FACC15" stroke="#EAB308" stroke-width="2"/>
  <!-- Left paw holding hot dog -->
  <ellipse cx="55" cy="145" rx="18" ry="14" fill="#FACC15"/>
  <!-- Hot dog in left paw -->
  <ellipse cx="48" cy="143" rx="20" ry="8" fill="#FACC15" stroke="#EAB308" stroke-width="2"/>
  <rect x="28" y="137" width="40" height="8" rx="4" fill="#D97706"/>
  <!-- Right paw -->
  <ellipse cx="145" cy="145" rx="18" ry="14" fill="#FACC15"/>
  <!-- Legs -->
  <ellipse cx="72" cy="165" rx="14" ry="12" fill="#FACC15"/>
  <ellipse cx="128" cy="165" rx="14" ry="12" fill="#FACC15"/>
  <!-- Tail -->
  <path d="M 150 120 Q 168 105 165 130" stroke="#FACC15" stroke-width="10" fill="none" stroke-linecap="round"/>
</svg>